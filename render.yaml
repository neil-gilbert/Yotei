databases:
  - name: yotei-postgres
    databaseName: yotei
    user: yotei
    region: frankfurt
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: yotei-api
    runtime: docker
    region: frankfurt
    plan: free
    dockerContext: .
    dockerfilePath: backend/src/Api/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: PORT
        value: "8080"
      - key: ConnectionStrings__Postgres
        fromDatabase:
          name: yotei-postgres
          property: connectionString
      - key: Database__Provider
        value: Postgres
      - key: Database__ApplyMigrations
        value: "true"
      - key: Storage__Provider
        value: Database
      - key: Cors__AllowedOrigins__0
        fromService:
          name: yotei-frontend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: Frontend__BaseUrl
        fromService:
          name: yotei-frontend
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: yotei-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: yotei-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_GITHUB_APP_INSTALL_URL
        value: "https://github.com/apps/<app-slug>/installations/new"
